# docker-compose.prod.yml  — used on AWS EC2 (pulls image from Docker Hub, no build)
version: '3.8'

services:
  web:
    image: sunzheini1407/ohmi_audit:latest   # pulled from Docker Hub
    # entrypoint.sh (baked into image) runs collectstatic + migrate automatically
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      # Override .env values for Docker networking
      - DOCKER=True
      - DEBUG=False
      - DATABASE_URL=postgresql://postgres_user:${DB_PASSWORD}@db/${DB_NAME}
    volumes:
      - media_volume:/app/media_files
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3

  db:
    image: postgres:13
    env_file:
      - .env
    environment:
      # Read directly from .env so they always match DB_* vars used by Django
      - POSTGRES_DB=${DB_NAME}
      - POSTGRES_USER=${DB_USER}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d ohmi_audit_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6
    volumes:
      - redis_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3


volumes:
  media_volume:
  postgres_data:
  redis_data:


# docker-compose.services.yml
# Starts ONLY PostgreSQL and Redis — no Django, no Celery.
# Use this when running Django from PyCharm (local non-Docker development).
#
# Usage:
#   docker compose -f docker-compose.services.yml up -d      # start backing services
#   docker compose -f docker-compose.services.yml down       # stop (keeps data)
#   docker compose -f docker-compose.services.yml down -v    # stop + wipe data

version: '3.8'

services:
  db:
    image: postgres:13
    environment:
      - POSTGRES_DB=ohmi_audit_db
      - POSTGRES_USER=postgres_user
      - POSTGRES_PASSWORD=password
    ports:
      - "5432:5432"        # exposed to host so PyCharm/Django can reach it on localhost:5432
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres_user -d ohmi_audit_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:6
    ports:
      - "6379:6379"        # exposed to host so PyCharm/Celery can reach it on localhost:6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:
  redis_data:

